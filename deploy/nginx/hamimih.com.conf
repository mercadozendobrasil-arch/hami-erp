# Nginx configuration for HAMI ERP.
# Domains:
# - hamimih.com
# - www.hamimih.com
# - staging.hamimih.com
#
# Assumptions:
# - Frontend static build is served from /var/www/hami-erp/apps/web/dist
# - NestJS API listens on 127.0.0.1:3001
# - NestJS API_PREFIX=api, so backend routes are available under /api/*
# - Cloudflare points the domains to this server

server {
    listen 80;
    server_name hamimih.com www.hamimih.com staging.hamimih.com;

    root /var/www/hami-erp/apps/web/dist;
    index index.html;

    # Frontend SPA routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API reverse proxy.
    # Frontend calls /api/* and Nginx forwards it to the local NestJS API.
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional cache for static assets generated with hashes.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
